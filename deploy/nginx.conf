# FitByMadu — Nginx reverse proxy config
# Copy this file to /etc/nginx/sites-available/fitbymadu on your Oracle server,
# then symlink: sudo ln -s /etc/nginx/sites-available/fitbymadu /etc/nginx/sites-enabled/fitbymadu
# SSL certificates are managed by Certbot — run:
#   sudo certbot --nginx -d fitbymadu.com.br -d www.fitbymadu.com.br

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name fitbymadu.com.br www.fitbymadu.com.br;
    return 301 https://$host$request_uri;
}

# Redirect www → non-www (HTTPS)
server {
    listen 443 ssl;
    server_name www.fitbymadu.com.br;

    ssl_certificate     /etc/letsencrypt/live/fitbymadu.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fitbymadu.com.br/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://fitbymadu.com.br$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    server_name fitbymadu.com.br;

    ssl_certificate     /etc/letsencrypt/live/fitbymadu.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fitbymadu.com.br/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
    }
}
