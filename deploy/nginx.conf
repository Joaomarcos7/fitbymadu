# FitByMadu — Nginx reverse proxy config
# Copy this file to /etc/nginx/sites-available/fitbymadu on your Oracle server,
# then symlink: sudo ln -s /etc/nginx/sites-available/fitbymadu /etc/nginx/sites-enabled/fitbymadu
# Run: sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
# Certbot will modify this file automatically to add SSL blocks.

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    location / {
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
