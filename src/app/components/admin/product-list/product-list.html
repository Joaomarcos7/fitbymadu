<div class="min-h-screen bg-gray-50">

  <!-- Top bar -->
  <header class="bg-white border-b border-gray-100 px-6 py-4 flex items-center gap-4">
    <a routerLink="/admin/dashboard" class="text-gray-400 hover:text-pink transition-colors">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/>
      </svg>
    </a>
    <h1 class="font-tight font-black text-near-black">Catálogo de Produtos</h1>
    <a routerLink="/admin/produtos/novo"
      class="ml-auto inline-flex items-center gap-2 bg-pink text-white text-sm font-bold px-5 py-2.5 rounded-xl hover:bg-pink-dark transition-colors shadow-sm shadow-pink/20">
      + Novo Produto
    </a>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-8">

    @if (items().length === 0) {
      <div class="text-center py-24">
        <p class="text-gray-300 text-lg">Nenhum produto encontrado.</p>
        <a routerLink="/admin/produtos/novo" class="inline-block mt-4 text-pink font-semibold text-sm">Adicionar o primeiro →</a>
      </div>
    } @else {
      <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-gray-100">
              <th class="text-left px-6 py-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Produto</th>
              <th class="text-left px-4 py-4 text-xs font-semibold text-gray-400 uppercase tracking-wider hidden sm:table-cell">Categoria</th>
              <th class="text-left px-4 py-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Preço</th>
              <th class="text-right px-6 py-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Ações</th>
            </tr>
          </thead>
          <tbody>
            @for (item of items(); track item.id) {
              <tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors">
                <td class="px-6 py-4">
                  <div class="flex items-center gap-3">
                    <img [src]="item.image" [alt]="item.title" class="w-12 h-12 object-cover rounded-xl shrink-0 bg-gray-100" />
                    <div>
                      <p class="font-tight font-bold text-near-black text-sm">{{ item.title }}</p>
                      <p class="text-gray-400 text-xs mt-0.5">ID: {{ item.id }}</p>
                    </div>
                  </div>
                </td>
                <td class="px-4 py-4 hidden sm:table-cell">
                  <span class="bg-pink/10 text-pink text-xs font-bold px-2.5 py-1 rounded-full">{{ item.tag }}</span>
                </td>
                <td class="px-4 py-4">
                  <span class="font-tight font-black text-near-black text-sm">{{ formatPrice(item.price) }}</span>
                </td>
                <td class="px-6 py-4">
                  <div class="flex items-center justify-end gap-2">
                    <a [routerLink]="['/admin/produtos/editar', item.id]"
                      class="inline-flex items-center gap-1.5 text-xs font-semibold text-near-black border border-gray-200 px-3 py-1.5 rounded-lg hover:border-pink hover:text-pink transition-colors">
                      Editar
                    </a>
                    <button
                      (click)="delete(item)"
                      [disabled]="deleting() === item.id"
                      class="inline-flex items-center gap-1.5 text-xs font-semibold text-red-400 border border-red-100 px-3 py-1.5 rounded-lg hover:bg-red-50 transition-colors disabled:opacity-50 cursor-pointer">
                      {{ deleting() === item.id ? '...' : 'Excluir' }}
                    </button>
                  </div>
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    }

  </main>
</div>
