<div class="min-h-screen bg-gray-50">

  <!-- Top bar -->
  <header class="bg-white border-b border-gray-100 px-6 py-4 flex items-center gap-4">
    <a routerLink="/admin/dashboard" class="text-gray-400 hover:text-pink transition-colors">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/>
      </svg>
    </a>
    <h1 class="font-tight font-black text-near-black">Configurações do Site</h1>
  </header>

  <main class="max-w-xl mx-auto px-6 py-8">
    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-6">

      <!-- Hero section -->
      <div class="bg-white rounded-2xl border border-gray-100 p-6 space-y-4">
        <h2 class="font-tight font-bold text-near-black">Seção Hero</h2>

        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-2">Imagem do Hero</label>
          @if (form.value.heroImage) {
            <img [src]="form.value.heroImage" alt="Hero preview"
              class="w-full h-40 object-cover rounded-xl mb-3 border border-gray-100" />
          }
          <app-image-upload [currentUrl]="form.value.heroImage ?? ''" (uploaded)="setHeroImage($event)" />
          <input formControlName="heroImage" type="url" placeholder="/modelo1.jpg ou URL completa"
            class="mt-2 w-full border border-gray-200 rounded-xl px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-pink/30 focus:border-pink" />
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1.5">Preço no Hero (label)</label>
          <input formControlName="heroPriceLabel" type="text" placeholder="R$ 79,90"
            class="w-full border border-gray-200 rounded-xl px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-pink/30 focus:border-pink" />
          <p class="text-xs text-gray-400 mt-1">Aparece no badge "a partir de" na imagem do hero.</p>
        </div>
      </div>

      <!-- Contact -->
      <div class="bg-white rounded-2xl border border-gray-100 p-6 space-y-4">
        <h2 class="font-tight font-bold text-near-black">Contato</h2>
        <div>
          <label class="block text-xs font-semibold text-gray-500 mb-1.5">Número do WhatsApp</label>
          <input formControlName="whatsappNumber" type="text" placeholder="5587991796903"
            class="w-full border border-gray-200 rounded-xl px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-pink/30 focus:border-pink" />
          <p class="text-xs text-gray-400 mt-1">Apenas dígitos com código do país. Ex: 5587991796903</p>
        </div>
      </div>

      @if (error()) {
        <p class="text-red-500 text-sm bg-red-50 rounded-xl px-4 py-3">{{ error() }}</p>
      }

      <div class="flex items-center gap-4 pb-8">
        <button type="submit" [disabled]="saving()"
          class="bg-pink hover:bg-pink-dark disabled:opacity-50 text-white font-bold text-sm px-8 py-3.5 rounded-xl transition-colors shadow-md shadow-pink/20 cursor-pointer">
          {{ saving() ? 'Salvando...' : 'Salvar configurações' }}
        </button>
        @if (saved()) {
          <span class="text-green-600 text-sm font-semibold">✓ Salvo com sucesso!</span>
        }
      </div>

    </form>
  </main>
</div>
