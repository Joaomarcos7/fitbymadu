<div class="min-h-screen bg-gray-50 flex items-center justify-center px-4">
  <div class="w-full max-w-sm">

    <!-- Logo -->
    <div class="text-center mb-8">
      <img src="/logo.jpg" alt="FitByMadu" class="h-16 w-16 rounded-2xl object-cover mx-auto mb-4 shadow-md" />
      <h1 class="font-tight font-black text-2xl text-near-black">Painel Admin</h1>
      <p class="text-gray-400 text-sm mt-1">FitByMadu</p>
    </div>

    <!-- Card -->
    <form [formGroup]="form" (ngSubmit)="submit()" class="bg-white rounded-3xl shadow-sm border border-gray-100 p-8">

      <div class="mb-6">
        <label class="block text-sm font-semibold text-near-black mb-2">Senha</label>
        <input
          type="password"
          formControlName="password"
          placeholder="••••••••"
          class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm text-near-black placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-pink/30 focus:border-pink transition-colors"
        />
      </div>

      @if (error()) {
        <p class="text-red-500 text-sm mb-4 bg-red-50 rounded-xl px-4 py-2.5">{{ error() }}</p>
      }

      <button
        type="submit"
        [disabled]="loading() || form.invalid"
        class="w-full bg-pink hover:bg-pink-dark disabled:opacity-50 text-white font-bold text-sm py-3.5 rounded-xl transition-colors shadow-md shadow-pink/20"
      >
        {{ loading() ? 'Entrando...' : 'Entrar' }}
      </button>

    </form>

    <p class="text-center text-xs text-gray-300 mt-6">
      Acesso restrito. Apenas administradores.
    </p>
  </div>
</div>
