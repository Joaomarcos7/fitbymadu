<div class="min-h-screen bg-gray-50">

  <!-- Top bar -->
  <header class="bg-white border-b border-gray-100 px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <img src="/logo.jpg" alt="FitByMadu" class="h-9 w-9 rounded-xl object-cover" />
      <div>
        <p class="font-tight font-black text-near-black text-sm">FitByMadu</p>
        <p class="text-gray-400 text-xs">Painel Admin</p>
      </div>
    </div>
    <div class="flex items-center gap-4">
      <a href="/" target="_blank" class="text-xs text-gray-400 hover:text-pink transition-colors">Ver site →</a>
      <button (click)="logout()" class="text-xs font-semibold text-gray-400 hover:text-red-500 transition-colors cursor-pointer">
        Sair
      </button>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-6 py-12">

    <h2 class="font-tight font-black text-2xl text-near-black mb-8">Dashboard</h2>

    <!-- Stats -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-10">
      <div class="bg-white rounded-2xl border border-gray-100 p-6">
        <p class="text-3xl font-tight font-black gradient-text">{{ productCount() }}</p>
        <p class="text-gray-400 text-sm mt-1">Produtos no catálogo</p>
      </div>
      <div class="bg-pink/5 border border-pink/15 rounded-2xl p-6 flex items-center gap-3">
        <div class="w-10 h-10 bg-pink rounded-xl flex items-center justify-center shrink-0">
          <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3"/>
          </svg>
        </div>
        <div>
          <p class="font-tight font-bold text-near-black text-sm">Gerenciar Produtos</p>
          <a routerLink="/admin/produtos" class="text-pink text-xs font-semibold">Acessar →</a>
        </div>
      </div>
      <div class="bg-white border border-gray-100 rounded-2xl p-6 flex items-center gap-3">
        <div class="w-10 h-10 bg-near-black rounded-xl flex items-center justify-center shrink-0">
          <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
          </svg>
        </div>
        <div>
          <p class="font-tight font-bold text-near-black text-sm">Configurações</p>
          <a routerLink="/admin/configuracoes" class="text-near-black/40 text-xs font-semibold hover:text-pink transition-colors">Acessar →</a>
        </div>
      </div>
    </div>

    <!-- Quick actions -->
    <div class="bg-white rounded-2xl border border-gray-100 p-6">
      <h3 class="font-tight font-bold text-near-black text-sm mb-4">Ações rápidas</h3>
      <div class="flex flex-wrap gap-3">
        <a routerLink="/admin/produtos/novo"
          class="inline-flex items-center gap-2 bg-pink text-white text-sm font-bold px-5 py-2.5 rounded-xl hover:bg-pink-dark transition-colors shadow-sm shadow-pink/20">
          + Novo Produto
        </a>
        <a routerLink="/admin/produtos"
          class="inline-flex items-center gap-2 border border-gray-200 text-near-black text-sm font-semibold px-5 py-2.5 rounded-xl hover:border-pink hover:text-pink transition-colors">
          Ver Catálogo
        </a>
        <a routerLink="/admin/configuracoes"
          class="inline-flex items-center gap-2 border border-gray-200 text-near-black text-sm font-semibold px-5 py-2.5 rounded-xl hover:border-pink hover:text-pink transition-colors">
          Configurações do Site
        </a>
      </div>
    </div>

  </main>
</div>
