<nav
  class="fixed top-0 left-0 right-0 z-50 transition-all duration-300"
  [class.bg-white]="scrolled()"
  [class.shadow-sm]="scrolled()"
  [class.border-b]="scrolled()"
  [class.border-gray-100]="scrolled()"
  [class.bg-white/0]="!scrolled()"
>
  <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">

    <!-- Logo -->
    <a href="/" class="hover:opacity-90 transition-opacity flex items-center">
      <div class="h-12 w-12 rounded-2xl overflow-hidden ring-2 ring-pink/20 shadow-sm shadow-pink/15">
        <img src="/logo.jpg" alt="FitByMadu" class="w-full h-full object-cover" />
      </div>
    </a>

    <!-- Desktop nav -->
    <div class="hidden md:flex items-center gap-8">
      <button
        (click)="scrollTo('catalogo')"
        class="text-sm font-medium text-near-black/60 hover:text-near-black transition-colors cursor-pointer"
      >
        Catálogo
      </button>
      <button
        (click)="scrollTo('historia')"
        class="text-sm font-medium text-near-black/60 hover:text-near-black transition-colors cursor-pointer"
      >
        Nossa História
      </button>
      <button
        (click)="scrollTo('contato')"
        class="text-sm font-semibold text-white bg-pink hover:bg-pink-dark transition-colors px-5 py-2.5 rounded-full cursor-pointer shadow-md shadow-pink/20 hover:shadow-pink/40"
      >
        Contato
      </button>
    </div>

    <!-- Mobile -->
    <div class="flex md:hidden">
      <button
        (click)="scrollTo('contato')"
        class="text-sm font-semibold text-white bg-pink hover:bg-pink-dark transition-colors px-4 py-2 rounded-full cursor-pointer shadow-md shadow-pink/20"
      >
        Contato
      </button>
    </div>

  </div>
</nav>
