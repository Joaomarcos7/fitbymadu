<section id="contato" class="py-24 bg-white">
  <div class="max-w-6xl mx-auto px-6">

    <div appFadeIn class="text-center mb-14">
      <span class="inline-block text-xs font-semibold tracking-widest text-pink uppercase mb-4 bg-pink/10 px-4 py-1.5 rounded-full border border-pink/20">
        Contato
      </span>
      <h2 class="font-tight font-black text-4xl sm:text-5xl text-near-black">
        Fale com a gente
      </h2>
      <p class="text-near-black/50 mt-3 text-base max-w-md mx-auto">
        Tire suas dúvidas, faça seu pedido ou só venha nos dizer oi — estamos por aqui!
      </p>
    </div>

    <div appFadeIn [appFadeInDelay]="150" class="grid sm:grid-cols-2 gap-4 sm:gap-6 max-w-2xl mx-auto">

      <!-- Instagram card -->
      <a
        [href]="instagramUrl"
        target="_blank"
        rel="noopener noreferrer"
        class="group relative overflow-hidden bg-white border border-gray-100 hover:border-pink/30 rounded-3xl p-8 hover:-translate-y-1.5 hover:shadow-xl hover:shadow-pink/10 transition-all duration-300 flex flex-col items-center text-center"
      >
        <div class="absolute inset-0 bg-gradient-to-br from-pink/5 to-pink-light/10 opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none rounded-3xl"></div>

        <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-pink/15 to-pink-light/20 flex items-center justify-center mb-5 group-hover:scale-110 transition-transform duration-300">
          <svg class="w-7 h-7 text-pink" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
          </svg>
        </div>

        <p class="font-tight font-bold text-near-black text-lg mb-1">Instagram</p>
        <p class="text-near-black/50 text-sm mb-5">&#64;fitbymadu</p>
        <span class="inline-flex items-center gap-2 text-pink text-sm font-bold group-hover:gap-3 transition-all duration-200">
          Seguir e comprar
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
          </svg>
        </span>
      </a>

      <!-- WhatsApp card -->
      <a
        [href]="whatsappUrl()"
        target="_blank"
        rel="noopener noreferrer"
        class="group relative overflow-hidden bg-white border border-gray-100 hover:border-green-200 rounded-3xl p-8 hover:-translate-y-1.5 hover:shadow-xl hover:shadow-green-100 transition-all duration-300 flex flex-col items-center text-center"
      >
        <div class="absolute inset-0 bg-gradient-to-br from-green-50 to-emerald-50 opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none rounded-3xl"></div>

        <div class="w-16 h-16 rounded-2xl bg-green-50 flex items-center justify-center mb-5 group-hover:scale-110 transition-transform duration-300">
          <svg class="w-7 h-7 text-green-500" fill="currentColor" viewBox="0 0 24 24">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
          </svg>
        </div>

        <p class="font-tight font-bold text-near-black text-lg mb-1">WhatsApp</p>
        <p class="text-near-black/50 text-sm mb-5">Fale diretamente</p>
        <span class="inline-flex items-center gap-2 text-green-600 text-sm font-bold group-hover:gap-3 transition-all duration-200">
          Enviar mensagem
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
          </svg>
        </span>
      </a>

    </div>
  </div>
</section>
